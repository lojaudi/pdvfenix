<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecionando...</title>
    <script>
      // Fallback SPA para hospedagens que não suportam .htaccess
      // Salva o caminho atual e redireciona para a raiz, onde o React assume.
      sessionStorage.redirect = location.href;
      window.location.replace("/");
    </script>
  </head>
  <body>
    <p>Redirecionando...</p>
  </body>
</html>
